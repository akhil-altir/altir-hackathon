<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altir Tech Day · Launch Trailer</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #000;
        color: #ebedf0;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .stage {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at 50% 0%, rgba(196, 255, 0, 0.1), transparent 35%),
          linear-gradient(180deg, #060606 0%, #000 100%);
      }
      .frame {
        position: relative;
        width: min(92vw, 1600px);
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(196, 255, 0, 0.35);
        box-shadow:
          0 0 0 1px rgba(196, 255, 0, 0.18),
          0 0 40px rgba(196, 255, 0, 0.12);
        background: #000;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .overlay {
        position: absolute;
        top: 10px;
        left: 12px;
        z-index: 2;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #c4ff00;
        opacity: 0.9;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="frame">
        <div class="overlay">Launch Trailer</div>
        <iframe src="./index.html" title="Altir Tech Day Trailer"></iframe>
      </section>
    </main>
  </body>
</html>
